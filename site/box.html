<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GenBrick</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header>
    <p><a href="index.html">&larr; Owned boxes</a></p>
    <h1 id="box-name">Loading…</h1>
    <p class="tagline" id="box-meta"></p>
  </header>

  <main>
    <div id="box-photo"></div>
    <div id="box-photo-caption"></div>
    <p id="box-official-link"></p>

    <h2>Minifigs</h2>
    <ul id="box-minifigs" class="minifig-list"><li class="loading">Loading…</li></ul>

    <h2>Parts</h2>
    <table id="box-parts" class="parts-table">
      <thead>
        <tr>
          <th>Part</th>
          <th>Color</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="3" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>
      This is a <strong>fan project, not affiliated with or endorsed by the LEGO Group</strong>.
      LEGO® is a trademark of the LEGO Group. Catalog data from
      <a href="https://rebrickable.com/" target="_blank" rel="noopener">Rebrickable</a>. Procedural
      renders use the open <a href="https://www.ldraw.org/" target="_blank" rel="noopener">LDraw</a>
      parts library.
    </p>
  </footer>

  <script src="vendor/sql.js/sql-wasm.js"></script>
  <script src="assets/shared.js"></script>
  <script src="assets/box.js"></script>
</body>
</html>
